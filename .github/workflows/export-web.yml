name: Export Web Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/. ~/.local/share/godot/export_templates/

      - name: Export
        run: |
          mkdir -v -p web
          godot --headless --export-release "Web" web/index.html

      - name: Commit export
        working-directory: ${{ github.workspace }}
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet || git commit -m "chore: update web export"
          git push
