name: Export & Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'itch'
        type: choice
        options:
          - testing
          - itch
          - pages
          - both

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/. ~/.local/share/godot/export_templates/

      - name: Export
        run: |
          mkdir -v -p web
          godot --headless --export-release "Web" web/index.html

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web/

  deploy-testing:
    needs: export
    if: ${{ inputs.target == 'testing' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download export artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web/

      - name: Deploy to carters-games-testing
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: abroederdorf/carters-games-testing
          branch: gh-pages
          folder: web/
          ssh-key: ${{ secrets.STAGING_DEPLOY_KEY }}

  deploy-itch:
    needs: export
    if: ${{ inputs.target == 'itch' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download export artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web/

      - name: Install butler
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
          unzip butler.zip
          chmod +x linux-amd64/butler

      - name: Deploy to itch.io
        run: ./linux-amd64/butler push web/ abroederdorf/carters-games:html5
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}

  deploy-pages:
    needs: export
    if: ${{ inputs.target == 'pages' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download export artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web/

      - name: Add CNAME
        run: echo "cartersgames.alpinealicia.com" > web/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
