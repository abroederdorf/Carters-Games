name: Export Web Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
      env:
        HOME: /root
    steps:
      - uses: actions/checkout@v4

      - name: Export
        run: |
          mkdir -v -p web
          godot --headless --export-release "Web" web/index.html

      - name: Commit export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git diff --staged --quiet || git commit -m "chore: update web export"
          git push
