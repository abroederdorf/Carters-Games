name: Export & Deploy to Netlify

on:
  workflow_dispatch:

jobs:
  export-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/. ~/.local/share/godot/export_templates/

      - name: Export
        run: |
          mkdir -v -p web
          godot --headless --export-release "Web" web/index.html

      - name: Deploy to Netlify
        run: netlify deploy --dir=web --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
