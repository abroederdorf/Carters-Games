name: Export & Deploy to Netlify

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          cp -r /root/.local/share/godot/export_templates/. ~/.local/share/godot/export_templates/

      - name: Export
        run: |
          mkdir -v -p web
          godot --headless --export-release "Web" web/index.html

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-export
          path: web/

  deploy:
    needs: export
    runs-on: ubuntu-latest
    steps:
      - name: Download export artifact
        uses: actions/download-artifact@v4
        with:
          name: web-export
          path: web/

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --dir=web --prod --site $NETLIFY_SITE_ID --auth $NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler

      - name: Deploy to itch.io
        run: ./butler push web/ abroederdorf/carters-games:html5
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
