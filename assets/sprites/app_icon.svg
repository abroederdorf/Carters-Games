<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Rounded Square with Ocean Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bgGrad)" />

  <!-- White Inner Glow -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="white" opacity="0.1" />

  <!-- The Fish: Large and Happy -->
  <!-- Body -->
  <path d="M120,256 Q180,100 350,180 T460,256 Q350,412 180,380 T120,256" fill="#fb8500" stroke="#e07a00" stroke-width="12" />
  
  <!-- Stripes -->
  <path d="M220,180 L200,340" stroke="#e07a00" stroke-width="25" stroke-linecap="round" opacity="0.5"/>
  <path d="M280,195 L265,330" stroke="#e07a00" stroke-width="25" stroke-linecap="round" opacity="0.5"/>
  <path d="M340,215 L330,310" stroke="#e07a00" stroke-width="25" stroke-linecap="round" opacity="0.5"/>

  <!-- Tail -->
  <path d="M400,256 Q440,180 480,256 Q440,332 400,256" fill="#ffb703" />

  <!-- Eye: Large and Cartoonish -->
  <circle cx="190" cy="220" r="35" fill="white" stroke="#e07a00" stroke-width="4" />
  <circle cx="190" cy="220" r="18" fill="black" />
  <circle cx="178" cy="205" r="8" fill="white" opacity="0.8" />

  <!-- Mouth: Big Smile -->
  <path d="M150,290 Q180,330 220,300" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" />

  <!-- Bubbles -->
  <circle cx="100" cy="150" r="20" fill="white" opacity="0.4" />
  <circle cx="140" cy="80" r="12" fill="white" opacity="0.3" />
  <circle cx="400" cy="400" r="25" fill="white" opacity="0.2" />
</svg>
