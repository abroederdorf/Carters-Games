<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Simple Cartoon Cat Face -->
  <circle cx="50" cy="55" r="35" fill="#f8f8f8" stroke="#333" stroke-width="2" />
  <!-- Ears -->
  <path d="M25,30 L15,10 L40,25 Z" fill="#f8f8f8" stroke="#333" stroke-width="2" />
  <path d="M75,30 L85,10 L60,25 Z" fill="#f8f8f8" stroke="#333" stroke-width="2" />
  <!-- Eyes -->
  <circle cx="40" cy="50" r="4" fill="#333" />
  <circle cx="60" cy="50" r="4" fill="#333" />
  <!-- Nose -->
  <path d="M48,60 L52,60 L50,63 Z" fill="#ff9999" stroke="#ff9999" stroke-width="1" />
  <!-- Mouth -->
  <path d="M45,65 Q50,70 55,65" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" />
  <!-- Whiskers -->
  <line x1="25" y1="60" x2="10" y2="58" stroke="#333" stroke-width="1" />
  <line x1="25" y1="65" x2="10" y2="68" stroke="#333" stroke-width="1" />
  <line x1="75" y1="60" x2="90" y2="58" stroke="#333" stroke-width="1" />
  <line x1="75" y1="65" x2="90" y2="68" stroke="#333" stroke-width="1" />
</svg>
