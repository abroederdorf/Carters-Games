<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fat: Fat dog, fat bird, fat beaver -->
  <!-- Fat Bird -->
  <circle cx="20" cy="30" r="15" fill="#ffd100" stroke="#333" stroke-width="1.5" />
  <circle cx="25" cy="25" r="2" fill="#333" />
  <path d="M35,30 L40,28 L35,26 Z" fill="#ff9900" />
  <!-- Fat Dog -->
  <ellipse cx="60" cy="70" rx="30" ry="20" fill="#a0522d" stroke="#333" stroke-width="1.5" />
  <circle cx="75" cy="60" r="10" fill="#a0522d" stroke="#333" stroke-width="1.5" />
  <circle cx="80" cy="58" r="1.5" fill="#333" />
  <!-- Fat Beaver -->
  <ellipse cx="30" cy="75" rx="20" ry="15" fill="#8b4513" stroke="#333" stroke-width="1.5" />
  <rect x="45" y="70" width="15" height="10" rx="5" fill="#8b4513" stroke="#333" stroke-width="1.5" />
  <circle cx="35" cy="70" r="1.5" fill="#333" />
</svg>
