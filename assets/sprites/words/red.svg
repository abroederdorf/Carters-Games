<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Red things: Balloon, Stop Sign, Firetruck -->
  <!-- Balloon -->
  <circle cx="30" cy="30" r="15" fill="#ff0000" />
  <path d="M30,45 Q30,55 35,60" fill="none" stroke="#999" stroke-width="1" />
  <!-- Stop Sign -->
  <path d="M70,15 L85,15 L95,25 L95,40 L85,50 L70,50 L60,40 L60,25 Z" fill="#ff0000" stroke="white" stroke-width="1" />
  <text x="77.5" y="36" font-family="Arial" font-size="8" text-anchor="middle" fill="white" font-weight="bold">STOP</text>
  <!-- Simple Firetruck -->
  <rect x="20" y="70" width="60" height="20" rx="2" fill="#ff0000" />
  <rect x="65" y="72" width="12" height="10" fill="#add8e6" />
  <circle cx="35" cy="90" r="5" fill="#333" />
  <circle cx="65" cy="90" r="5" fill="#333" />
</svg>
