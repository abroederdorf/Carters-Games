<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Pelican: White body, big orange beak -->
  <circle cx="60" cy="40" r="15" fill="white" /> <!-- Head -->
  <path d="M65,45 Q90,50 85,60 Q75,70 60,65 Z" fill="#ffb700" /> <!-- Beak -->
  <ellipse cx="40" cy="60" rx="25" ry="15" fill="white" /> <!-- Body -->
  <path d="M40,45 Q20,10 5,30" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" /> <!-- Wing L -->
  <path d="M40,45 Q60,10 75,30" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" /> <!-- Wing R -->
  <circle cx="65" cy="35" r="2" fill="black" /> <!-- Eye -->
</svg>
